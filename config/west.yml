# west.yml — ZMK user config manifest
# Place at the ROOT of your zmk-config repo alongside build.yaml
#
# Adds the zmk-locales module so locale/keys_se.h is available at build time.

manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: joelspadin
      url-base: https://github.com/joelspadin

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    - name: zmk-locales
      remote: joelspadin
      revision: main

  self:
    path: config
